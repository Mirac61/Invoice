services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - backend/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - backend/.env
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
